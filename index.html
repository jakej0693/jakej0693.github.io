<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JakeJ0693</title>
  <link href="https://fonts.googleapis.com/css2?family=Iceland&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #222;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #6C3BAA;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* Layout */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 2rem;
      width: 100%;
    }

    /* Header */
    header {
      padding: 4rem 0 3rem;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.6s ease both;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px dashed var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      overflow: hidden;
      position: relative;
    }

    .avatar svg {
      width: 60%;
      height: 60%;
      opacity: 0.3;
    }

    .avatar-label {
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      position: absolute;
      bottom: 10px;
    }

    .tag {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
      display: block;
    }

    h1 {
      font-family: 'Iceland', monospace;
      font-weight: 800;
      font-size: clamp(3.5rem, 10vw, 6rem);
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    /* About */
    .about {
      padding: 3.5rem 0;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .about p {
      font-size: 1rem;
      line-height: 1.8;
      color: #aaa;
      max-width: 560px;
    }

    .about p + p {
      margin-top: 1.2rem;
    }

    /* Footer */
    footer {
      margin-top: auto;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      animation: fadeUp 0.6s 0.3s ease both;
    }

    footer .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    footer span {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .social-links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .social-links a {
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }

    .social-links a:hover {
      color: var(--accent);
    }

    .social-links .discord {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* Animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Mobile */
    @media (max-width: 480px) {
      header { padding: 2.5rem 0 2rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="avatar">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="38" r="22" fill="#888"/>
          <ellipse cx="50" cy="90" rx="35" ry="22" fill="#888"/>
        </svg>
        <span class="avatar-label">photo</span>
      </div>
      <span class="tag">Find me on Xbox &amp; Steam</span>
      <h1>Jake<span>J0693</span></h1>
    </header>

    <section class="about">
      <div class="section-label">About</div>
      <p>
        Hey, I'm Jake. I enjoy Gaming, Technology, and Photography.
      </p>
      <p>
        Hit me up on the platforms below.
      </p>
    </section>
  </div>

  <footer>
    <div class="container">
      <span>© 2026 JakeJ0693</span>
      <div class="social-links">
        <a href="https://instagram.com/jakej0693" target="_blank">Instagram</a>
        <a href="https://xbox.com/play/user/jakej0693" target="_blank">Xbox</a>
        <a href="https://steamcommunity.com/id/torqueylemur" target="_blank">Steam</a>
        <a href="https://discord.gg/YFXHhbQm3" target="_blank">Discord</a>
      </div>
    </div>
  </footer>

</body>
</html>
